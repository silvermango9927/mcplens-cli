<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="glow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#eef2ff"/>
      <stop offset="0.55" stop-color="#ffffff"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#glow)"/>
  <rect x="0" y="0" width="1200" height="8" fill="#6366f1"/>

  <!-- wordmark -->
  <g transform="translate(80, 86)">
    <circle cx="18" cy="18" r="16" fill="none" stroke="#6366f1" stroke-width="4"/>
    <circle cx="18" cy="18" r="6" fill="#6366f1"/>
    <text x="48" y="27" font-family="-apple-system, Segoe UI, Roboto, Arial, sans-serif"
          font-size="30" font-weight="700" fill="#0f172a" letter-spacing="-0.5">mcplens</text>
  </g>

  <!-- headline -->
  <text x="80" y="270" font-family="-apple-system, Segoe UI, Roboto, Arial, sans-serif"
        font-size="74" font-weight="800" fill="#0f172a" letter-spacing="-2">Make MCP servers</text>
  <text x="80" y="356" font-family="-apple-system, Segoe UI, Roboto, Arial, sans-serif"
        font-size="74" font-weight="800" fill="#0f172a" letter-spacing="-2">agents can <tspan fill="#6366f1">actually use.</tspan></text>

  <!-- subhead -->
  <text x="80" y="426" font-family="-apple-system, Segoe UI, Roboto, Arial, sans-serif"
        font-size="29" font-weight="400" fill="#64748b">Audit tool discoverability · Compile bloated APIs into lean MCP servers</text>

  <!-- install chip -->
  <g transform="translate(80, 480)">
    <rect x="0" y="0" width="640" height="62" rx="12" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
    <text x="24" y="40" font-family="SFMono-Regular, Menlo, Consolas, monospace"
          font-size="25" fill="#334155">$ npx mcplens-cli audit-mcp</text>
  </g>

  <!-- footer note -->
  <text x="80" y="588" font-family="-apple-system, Segoe UI, Roboto, Arial, sans-serif"
        font-size="22" font-weight="500" fill="#94a3b8">Local &amp; offline · No telemetry · MIT · mcplens.tech</text>
</svg>
